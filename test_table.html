<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GFM Table Test</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/react-markdown@10/dist/react-markdown.umd.js"></script>
  <script src="https://unpkg.com/remark-gfm@4/dist/remark-gfm.umd.js"></script>
</head>
<body>
  <div id="root"></div>
  <script>
    const markdown = '| A | B |\n|----|----|\n| 1 | 2 |';
    const root = ReactDOM.createRoot(document.getElementById('root'));
    const el = React.createElement(ReactMarkdown, {
      children: markdown,
      plugins: [[ReactMarkdownRemarkGfm.default]]
    });
    root.render(el);
  </script>
</body>
</html>
